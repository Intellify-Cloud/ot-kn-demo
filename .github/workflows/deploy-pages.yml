name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # GitHub Pages serves this repo at /ot-kn-demo/, so the base path
      # is set here at build time. Vercel (deploy.sh) keeps the default "/".
      - name: Build
        run: npm run build -- --base=/ot-kn-demo/

      # SPA fallback: GitHub Pages serves 404.html for unknown paths,
      # letting vue-router handle /contact, /privacy, etc. on refresh.
      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
